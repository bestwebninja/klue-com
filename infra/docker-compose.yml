version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kluje
      POSTGRES_PASSWORD: kluje
      POSTGRES_DB: kluje
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kluje -d kluje"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.example
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://kluje:kluje@postgres:5432/kluje
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api/v1
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - api

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.86.1
    restart: unless-stopped
    env_file:
      - ../.env.example
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n/workflows:/data/workflows:ro

volumes:
  pg_data:
  n8n_data:
