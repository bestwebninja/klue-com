meta:
  command: /v5/build-universal-operating-layer
  agent_id: V5
  agent_title: Vertical 5 Command Center Operations Expert
  version: 1
  status: draft
intent: Define the Kluje universal operating layer contract used by Vertical 5 orchestration.
inputs:
  required:
    - request_text
    - organization_context
  optional:
    - policy_context
    - integration_context
processing_rules:
  - normalize identities, policies, and workflow state into a cross-vertical envelope
  - stamp every response with routing metadata, audit metadata, and rollup metadata
outputs:
  primary_artifact: universal-operating-layer
  schema:
    routing_envelope:
      request_id: string
      request_type: string
      target_domain: string
      fallback_domains: string[]
    governance_envelope:
      policy_checks: string[]
      approvals_required: string[]
      risk_level: enum[low, medium, high, critical]
    rollup_envelope:
      rollup_schema_version: string
      rollup_keys: string[]
      emitted_at: string
