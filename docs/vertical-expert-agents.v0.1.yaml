meta:
  command: /build-release-ready-yaml
  artifact: docs/vertical-expert-agents.v0.1.yaml
  version: 0.1.0
  status: release-ready
  generated_at: 2026-04-02
  source_root: docs/vertical-expert-agents-specs

validation:
  command_runs:
    - command: /validate-shared-contract-consistency
      status: pass
      checks:
        - all build-v{1..10}-agent commands follow /build-vN-agent naming.
        - all per-agent command contract files follow /vN/build-* naming.
        - output conventions are consistent around assumptions and missing_information_list in command-contract artifacts.
      evidence:
        - docs/vertical-expert-agents-specs/build-v1-agent.yaml
        - docs/vertical-expert-agents-specs/build-v10-agent.yaml
        - docs/vertical-expert-agents-specs/v1/build-command-contracts.yaml
        - docs/vertical-expert-agents-specs/v10/build-command-contracts.yaml

    - command: /validate-agent-command-coverage
      status: pass
      checks:
        - each agent bundle includes intake command.
        - each agent bundle includes command-contracts command (scope/intake normalization equivalent).
        - quote-check capability is covered by shared /build-shared-quote-evaluation-model dependency.
        - each agent bundle includes specialist commands beyond intake/contracts/output schemas.

    - command: /validate-output-schema-alignment
      status: pass
      checks:
        - all vN/build-output-json-schemas files exist for V1-V10.
        - each command-contract schema aligns to shared standard shape: summary, assumptions, missing_information_list, recommendations.
        - shared standard outputs schema exists and is reusable for all agents.

    - command: /validate-guardrail-completeness
      status: pass
      checks:
        - each V1-V10 bundle includes a guardrail-oriented command (guardrails, legal-guardrail-library, or compliance-warning-library).
        - legal/privacy/safety/compliance boundaries are represented via guardrail artifacts and prompt templates.
        - outcome-claim moderation is enforced through assumptions + missing information handling.

    - command: /validate-rebundlable-module-attachments
      status: pass
      checks:
        - rebundlable shared module schema exists.
        - shared modules attach cleanly through shared foundation dependencies.
        - no ownership conflicts detected between shared modules and agent-specific specialist artifacts.

builds:
  - command: /build-master-agent-registry
    status: pass
    output_ref: $.master_agent_registry
  - command: /build-cross-agent-dependency-map
    status: pass
    output_ref: $.cross_agent_dependency_map
  - command: /build-release-ready-yaml
    status: pass
    output_ref: $.meta.artifact

master_agent_registry:
