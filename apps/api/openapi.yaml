openapi: 3.1.0
info:
  title: Kluje Enterprise API
  version: 0.1.0
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Liveness endpoint
      responses:
        '200':
          description: API healthy
  /auth/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '503':
          description: Disabled. Use Supabase auth flow instead
  /auth/login:
    post:
      summary: Authenticate a user and issue JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '503':
          description: Disabled. Use Supabase auth flow instead
  /auth/me:
    get:
      summary: Return the authenticated user from access JWT
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
        '401':
          description: Missing, invalid, or expired token
        '503':
          description: Auth validation backend unavailable
  /campaigns:
    get:
      summary: List campaigns
      responses:
        '200':
          description: Campaign list
    post:
      summary: Create campaign
      responses:
        '201':
          description: Campaign created
  /leads:
    post:
      summary: Ingest lead with marketplace scoping metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadIntakeRequest'
      responses:
        '201':
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadIntakeResponse'
        '400':
          description: Validation error
  /leads/{leadId}:
    get:
      summary: Fetch a lead by identifier
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lead record
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/LeadIntakeResponse'
        '404':
          description: Lead not found
  /providers/search:
    get:
      summary: Search providers with hard constraints and rank scoring
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: serviceCategory
          required: true
          schema:
            type: string
        - in: query
          name: budget
          required: false
          schema:
            type: number
        - in: query
          name: zipCode
          required: false
          schema:
            type: string
        - in: query
          name: intent
          required: false
          schema:
            type: string
            enum: [urgent_service, planned_project, quote_only]
        - in: query
          name: topN
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Ranked provider candidates
  /routing/evaluate:
    post:
      summary: Evaluate marketplace routing decision (no dispatch)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, leadSummary, serviceCategory, requester]
              properties:
                tenantId: { type: string, format: uuid }
                leadId: { type: string, format: uuid }
                leadSummary: { type: string }
                serviceCategory: { type: string }
                requestedTimeline: { type: string }
                budget: { type: number }
                zipCode: { type: string }
                topN: { type: integer, minimum: 1, maximum: 20 }
                dryRun: { type: boolean, default: false }
                requester:
                  type: object
                  properties:
                    email: { type: string, format: email }
                    orgName: { type: string }
                    tags:
                      type: array
                      items: { type: string }
                attributes:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Routing evaluation result
  /routing/dispatch:
    post:
      summary: Dispatch a previously evaluated routing run
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [runId]
              properties:
                runId: { type: string, format: uuid }
      responses:
        '200':
          description: Routing dispatch accepted
        '404':
          description: Routing run not found
  /quote-requests/{id}:
    get:
      summary: Fetch quote request reasoning and dispatch outcomes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quote request found
        '404':
          description: Quote request not found
  /routing/runs/{runId}:
    get:
      summary: Fetch routing run with transparent decision and handoff details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Routing run details
        '404':
          description: Routing run not found
  /billing/checkout-session:
    post:
      summary: Create Stripe Checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, customerId, planTier]
              properties:
                tenantId: { type: string }
                customerId: { type: string }
                planTier:
                  type: string
                  enum: [starter, growth, enterprise]
                advertiserId: { type: string }
                successUrl: { type: string, format: uri }
                cancelUrl: { type: string, format: uri }
      responses:
        '201':
          description: Checkout session created
  /billing/subscriptions/{tenantId}:
    get:
      summary: Fetch current subscription and billing status for a tenant
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription found
        '404':
          description: Tenant has no active Stripe subscription
  /billing/webhooks/stripe:
    post:
      summary: Stripe webhook endpoint
      description: |
        Validates Stripe signature and updates internal subscription status tracker.
        Uses event-id idempotency to skip duplicate deliveries.
      responses:
        '200':
          description: Event processed
        '400':
          description: Signature verification failed
  /area-risk/score:
    post:
      summary: Score regional operational area risk at a safe geography level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input, areaProfiles]
              properties:
                input:
                  type: object
                  properties:
                    address: { type: string }
                    lat: { type: number }
                    lng: { type: number }
                    tract: { type: string }
                    zip: { type: string }
                    county: { type: string }
                    cityCluster: { type: string }
                context:
                  type: object
                  properties:
                    clientKey: { type: string }
                areaProfiles:
                  type: object
                  description: Candidate geographic profiles used for safe geography escalation
      responses:
        '200':
          description: Area risk score or safe suppression

  /support/tickets:
    post:
      summary: Create a support ticket for triage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportTicketCreateRequest'
      responses:
        '201':
          description: Support ticket created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SupportTicket'
  /support/tickets/{ticketId}:
    get:
      summary: Fetch support ticket with event timeline
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Support ticket and event history
        '404':
          description: Ticket not found
  /support/disputes:
    post:
      summary: Submit a dispute linked to support triage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeCreateRequest'
      responses:
        '201':
          description: Dispute submitted
  /support/disputes/{disputeId}/evidence:
    post:
      summary: Attach dispute evidence artifacts
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: disputeId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeEvidenceCreateRequest'
      responses:
        '201':
          description: Evidence attached
        '404':
          description: Dispute not found
  /support/disputes/{disputeId}/escalate:
    post:
      summary: Escalate dispute to internal operations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: disputeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dispute escalated
        '404':
          description: Dispute not found
  /ads/placements/recommendations:
    post:
      summary: Generate AI placement recommendations for a campaign brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vertical, dailyBudget, targetGeos]
              properties:
                vertical: { type: string }
                dailyBudget: { type: number }
                targetGeos:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Ranked placements returned
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LeadAttachment:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 0 }
    LeadScope:
      type: object
      required: [summary]
      properties:
        summary: { type: string }
        urgency:
          type: string
          enum: [asap, planned, researching]
        deliverables:
          type: array
          items: { type: string }
        preferredStartDate: { type: string }
        accessibilityNeeds:
          type: array
          items: { type: string }
    LeadIntakeRequest:
      type: object
      required: [source, contactName, contactEmail, location, serviceCategory, intentScore]
      properties:
        source: { type: string }
        contactName: { type: string }
        contactEmail: { type: string, format: email }
        contactPhone: { type: string }
        location: { type: string }
        serviceCategory: { type: string }
        intentScore: { type: number, minimum: 0, maximum: 100 }
        budgetMin: { type: number, minimum: 0 }
        budgetMax: { type: number, minimum: 0 }
        timeline:
          type: string
          enum: [urgent, this_week, this_month, flexible]
        requirements:
          type: array
          items: { type: string }
        scope:
          $ref: '#/components/schemas/LeadScope'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/LeadAttachment'
        priorityTier:
          type: string
          enum: [high, medium, low]
    LeadIntakeResponse:
      allOf:
        - $ref: '#/components/schemas/LeadIntakeRequest'
        - type: object
          required:
            - id
            - status
            - intakeStatus
            - normalizedCategory
            - normalizedLocation
            - intakeScore
            - missingInformation
            - enrichmentNotes
            - requirements
            - attachments
            - assignmentQueue
            - createdAt
            - updatedAt
          properties:
            id: { type: string, format: uuid }
            status:
              type: string
              enum: [new, routed, accepted, rejected]
            intakeStatus:
              type: string
              enum: [pending, in_review, needs_info, ready_for_routing]
            normalizedCategory: { type: string }
            normalizedLocation: { type: string }
            intakeScore: { type: number }
            missingInformation:
              type: array
              items:
                type: object
                required: [code, message, severity]
                properties:
                  code: { type: string }
                  message: { type: string }
                  severity:
                    type: string
                    enum: [low, medium, high]
            enrichmentNotes:
              type: array
              items: { type: string }
            assignmentQueue:
              type: array
              items: { type: string }
            assignedAgentId: { type: string }
            routedAt: { type: string, format: date-time }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }


    IssueClassification:
      type: string
      enum: [account_access, billing_payment, service_quality, provider_conduct, technical_issue, safety_incident, other]
    EscalationState:
      type: string
      enum: [none, pending_review, escalated_internal, escalated_external, resolved]
    SupportTicketCreateRequest:
      type: object
      required: [tenantId, requesterEmail, subject, description, classification]
      properties:
        tenantId: { type: string, format: uuid }
        requesterUserId: { type: string, format: uuid }
        requesterEmail: { type: string, format: email }
        subject: { type: string }
        description: { type: string }
        classification:
          $ref: '#/components/schemas/IssueClassification'
        priority:
          type: string
          enum: [low, medium, high, critical]
        relatedLeadId: { type: string, format: uuid }
        metadata:
          type: object
          additionalProperties: true
    SupportTicket:
      allOf:
        - $ref: '#/components/schemas/SupportTicketCreateRequest'
        - type: object
          required: [id, priority, status, escalationState, metadata, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            priority:
              type: string
              enum: [low, medium, high, critical]
            status:
              type: string
              enum: [open, triaged, waiting_on_customer, resolved, closed]
            escalationState:
              $ref: '#/components/schemas/EscalationState'
            metadata:
              type: object
              additionalProperties: true
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    DisputeCreateRequest:
      type: object
      required: [tenantId, issueClassification, reason]
      properties:
        tenantId: { type: string, format: uuid }
        ticketId: { type: string, format: uuid }
        initiatedByUserId: { type: string, format: uuid }
        issueClassification:
          $ref: '#/components/schemas/IssueClassification'
        reason: { type: string }
        amountCents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        escalationState:
          $ref: '#/components/schemas/EscalationState'
        metadata:
          type: object
          additionalProperties: true
    DisputeEvidenceCreateRequest:
      type: object
      required: [evidenceType, uri]
      properties:
        evidenceType:
          type: string
          enum: [document, image, video, chat_transcript, other]
        uri: { type: string, format: uri }
        note: { type: string }
        submittedByUserId: { type: string, format: uuid }
