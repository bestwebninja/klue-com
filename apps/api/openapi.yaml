openapi: 3.1.0
info:
  title: Kluje Enterprise API
  version: 0.1.0
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Liveness endpoint
      responses:
        '200':
          description: API healthy
  /auth/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '503':
          description: Disabled. Use Supabase auth flow instead
  /auth/login:
    post:
      summary: Authenticate a user and issue JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '503':
          description: Disabled. Use Supabase auth flow instead
  /auth/me:
    get:
      summary: Return the authenticated user from access JWT
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
        '401':
          description: Missing, invalid, or expired token
        '503':
          description: Auth validation backend unavailable
  /campaigns:
    get:
      summary: List campaigns
      responses:
        '200':
          description: Campaign list
    post:
      summary: Create campaign
      responses:
        '201':
          description: Campaign created
  /leads:
    post:
      summary: Ingest lead with marketplace scoping metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadIntakeRequest'
      responses:
        '201':
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadIntakeResponse'
        '400':
          description: Validation error
  /leads/{leadId}:
    get:
      summary: Fetch a lead by identifier
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lead record
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/LeadIntakeResponse'
        '404':
          description: Lead not found
  /providers/search:
    get:
      summary: Search providers with hard constraints and rank scoring
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: serviceCategory
          required: true
          schema:
            type: string
        - in: query
          name: budget
          required: false
          schema:
            type: number
        - in: query
          name: zipCode
          required: false
          schema:
            type: string
        - in: query
          name: intent
          required: false
          schema:
            type: string
            enum: [urgent_service, planned_project, quote_only]
        - in: query
          name: topN
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Ranked provider candidates
  /routing/evaluate:
    post:
      summary: Evaluate marketplace routing decision (no dispatch)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, leadSummary, serviceCategory, requester]
              properties:
                tenantId: { type: string, format: uuid }
                leadId: { type: string, format: uuid }
                leadSummary: { type: string }
                serviceCategory: { type: string }
                requestedTimeline: { type: string }
                budget: { type: number }
                zipCode: { type: string }
                topN: { type: integer, minimum: 1, maximum: 20 }
                dryRun: { type: boolean, default: false }
                requester:
                  type: object
                  properties:
                    email: { type: string, format: email }
                    orgName: { type: string }
                    tags:
                      type: array
                      items: { type: string }
                attributes:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Routing evaluation result
  /routing/dispatch:
    post:
      summary: Dispatch a previously evaluated routing run
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [runId]
              properties:
                runId: { type: string, format: uuid }
      responses:
        '200':
          description: Routing dispatch accepted
        '404':
          description: Routing run not found
  /quote-requests/{id}:
    get:
      summary: Fetch quote request reasoning and dispatch outcomes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quote request found
        '404':
          description: Quote request not found
  /routing/runs/{runId}:
    get:
      summary: Fetch routing run with transparent decision and handoff details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Routing run details
        '404':
          description: Routing run not found
  /billing/checkout-session:
    post:
      summary: Create Stripe Checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, customerId, planTier]
              properties:
                tenantId: { type: string }
                customerId: { type: string }
                planTier:
                  type: string
                  enum: [starter, growth, enterprise]
                advertiserId: { type: string }
                successUrl: { type: string, format: uri }
                cancelUrl: { type: string, format: uri }
      responses:
        '201':
          description: Checkout session created
  /billing/subscriptions/{tenantId}:
    get:
      summary: Fetch current subscription and billing status for a tenant
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription found
        '404':
          description: Tenant has no active Stripe subscription
  /billing/webhooks/stripe:
    post:
      summary: Stripe webhook endpoint
      description: |
        Validates Stripe signature and updates internal subscription status tracker.
        Uses event-id idempotency to skip duplicate deliveries.
      responses:
        '200':
          description: Event processed
        '400':
          description: Signature verification failed
  /area-risk/score:
    post:
      summary: Score regional operational area risk at a safe geography level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input, areaProfiles]
              properties:
                input:
                  type: object
                  properties:
                    address: { type: string }
                    lat: { type: number }
                    lng: { type: number }
                    tract: { type: string }
                    zip: { type: string }
                    county: { type: string }
                    cityCluster: { type: string }
                context:
                  type: object
                  properties:
                    clientKey: { type: string }
                areaProfiles:
                  type: object
                  description: Candidate geographic profiles used for safe geography escalation
      responses:
        '200':
          description: Area risk score or safe suppression
  /ads/placements/recommendations:
    post:
      summary: Generate AI placement recommendations for a campaign brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vertical, dailyBudget, targetGeos]
              properties:
                vertical: { type: string }
                dailyBudget: { type: number }
                targetGeos:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Ranked placements returned

  /expert/questions:
    post:
      summary: Create a new Ask-an-Expert question
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpertQuestionCreateRequest'
      responses:
        '201':
          description: Expert question created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      question:
                        $ref: '#/components/schemas/ExpertQuestion'
                      assignment:
                        $ref: '#/components/schemas/ExpertAssignment'
        '400':
          description: Validation error
    get:
      summary: List Ask-an-Expert questions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: '#/components/schemas/ExpertQuestionStatus'
      responses:
        '200':
          description: Expert questions list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      allOf:
                        - $ref: '#/components/schemas/ExpertQuestion'
                        - type: object
                          properties:
                            answers:
                              type: array
                              items:
                                $ref: '#/components/schemas/ExpertAnswer'
                            assignments:
                              type: array
                              items:
                                $ref: '#/components/schemas/ExpertAssignment'
  /expert/questions/{questionId}/answers:
    post:
      summary: Post an expert answer to a question
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: questionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpertAnswerCreateRequest'
      responses:
        '201':
          description: Expert answer created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ExpertAnswer'
        '404':
          description: Question not found
  /moderation/review:
    post:
      summary: Log a moderation review action
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationReviewRequest'
      responses:
        '201':
          description: Moderation action logged
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ModerationAction'
        '400':
          description: Validation error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LeadAttachment:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 0 }
    LeadScope:
      type: object
      required: [summary]
      properties:
        summary: { type: string }
        urgency:
          type: string
          enum: [asap, planned, researching]
        deliverables:
          type: array
          items: { type: string }
        preferredStartDate: { type: string }
        accessibilityNeeds:
          type: array
          items: { type: string }
    LeadIntakeRequest:
      type: object
      required: [source, contactName, contactEmail, location, serviceCategory, intentScore]
      properties:
        source: { type: string }
        contactName: { type: string }
        contactEmail: { type: string, format: email }
        contactPhone: { type: string }
        location: { type: string }
        serviceCategory: { type: string }
        intentScore: { type: number, minimum: 0, maximum: 100 }
        budgetMin: { type: number, minimum: 0 }
        budgetMax: { type: number, minimum: 0 }
        timeline:
          type: string
          enum: [urgent, this_week, this_month, flexible]
        requirements:
          type: array
          items: { type: string }
        scope:
          $ref: '#/components/schemas/LeadScope'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/LeadAttachment'
        priorityTier:
          type: string
          enum: [high, medium, low]
    LeadIntakeResponse:
      allOf:
        - $ref: '#/components/schemas/LeadIntakeRequest'
        - type: object
          required:
            - id
            - status
            - intakeStatus
            - normalizedCategory
            - normalizedLocation
            - intakeScore
            - missingInformation
            - enrichmentNotes
            - requirements
            - attachments
            - assignmentQueue
            - createdAt
            - updatedAt
          properties:
            id: { type: string, format: uuid }
            status:
              type: string
              enum: [new, routed, accepted, rejected]
            intakeStatus:
              type: string
              enum: [pending, in_review, needs_info, ready_for_routing]
            normalizedCategory: { type: string }
            normalizedLocation: { type: string }
            intakeScore: { type: number }
            missingInformation:
              type: array
              items:
                type: object
                required: [code, message, severity]
                properties:
                  code: { type: string }
                  message: { type: string }
                  severity:
                    type: string
                    enum: [low, medium, high]
            enrichmentNotes:
              type: array
              items: { type: string }
            assignmentQueue:
              type: array
              items: { type: string }
            assignedAgentId: { type: string }
            routedAt: { type: string, format: date-time }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    ExpertQuestionStatus:
      type: string
      enum: [open, assigned, answered, closed, moderation_hold]
    UnsafeAdviceState:
      type: string
      enum: [none, suspected, confirmed, cleared]
    ModerationActionType:
      type: string
      enum: [approve, reject, flag, escalate, request_changes]
    ModerationTargetType:
      type: string
      enum: [question, answer]
    ExpertQuestionCreateRequest:
      type: object
      required: [title, body, category]
      properties:
        title: { type: string, minLength: 5, maxLength: 200 }
        body: { type: string, minLength: 10, maxLength: 10000 }
        category: { type: string, minLength: 2, maxLength: 120 }
        tags:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
        assignToExpertUserId: { type: string, format: uuid }
        assignmentReason: { type: string }
    ExpertAnswerCreateRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 10, maxLength: 10000 }
        citations:
          type: array
          items: { type: string, format: uri }
        unsafeAdviceState:
          $ref: '#/components/schemas/UnsafeAdviceState'
        metadata:
          type: object
          additionalProperties: true
    ExpertQuestion:
      type: object
      required: [id, tenantId, askedByUserId, title, body, category, tags, status, unsafeAdviceState, metadata, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        askedByUserId: { type: string }
        title: { type: string }
        body: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        status:
          $ref: '#/components/schemas/ExpertQuestionStatus'
        unsafeAdviceState:
          $ref: '#/components/schemas/UnsafeAdviceState'
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ExpertAnswer:
      type: object
      required: [id, tenantId, questionId, expertUserId, body, citations, unsafeAdviceState, metadata, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        questionId: { type: string, format: uuid }
        expertUserId: { type: string }
        body: { type: string }
        citations:
          type: array
          items: { type: string, format: uri }
        unsafeAdviceState:
          $ref: '#/components/schemas/UnsafeAdviceState'
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ExpertAssignment:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        questionId: { type: string, format: uuid }
        expertUserId: { type: string, format: uuid }
        assignedByUserId: { type: string }
        status:
          type: string
          enum: [pending, accepted, declined, completed]
        reason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ModerationReviewRequest:
      type: object
      required: [targetType, targetId, actionType, unsafeAdviceState]
      properties:
        targetType:
          $ref: '#/components/schemas/ModerationTargetType'
        targetId: { type: string, format: uuid }
        actionType:
          $ref: '#/components/schemas/ModerationActionType'
        unsafeAdviceState:
          $ref: '#/components/schemas/UnsafeAdviceState'
        reason: { type: string }
        metadata:
          type: object
          additionalProperties: true
    ModerationAction:
      type: object
      required: [id, tenantId, targetType, targetId, actionType, unsafeAdviceState, metadata, reviewedByUserId, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        targetType:
          $ref: '#/components/schemas/ModerationTargetType'
        targetId: { type: string, format: uuid }
        actionType:
          $ref: '#/components/schemas/ModerationActionType'
        unsafeAdviceState:
          $ref: '#/components/schemas/UnsafeAdviceState'
        reason: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        reviewedByUserId: { type: string }
        createdAt: { type: string, format: date-time }
