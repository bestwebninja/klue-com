meta:
  command: /build-v10-agent
  agent_id: V10
  agent_title: Property Valuation & Advisory Expert
  version: 1
  status: draft
intent: Build the full V10 agent specification bundle.
inputs:
  required:
    - valuation_goal
    - asset_context
  optional:
    - report_audience
    - timeline
processing_rules:
  - run shared foundation dependency checks first
  - identify assumptions affecting valuation confidence
outputs:
  primary_artifact: v10-agent-bundle
  includes:
    - /v10/build-intake-question-tree
    - /v10/build-command-contracts
    - /v10/build-output-json-schemas
    - /v10/build-valuation-purpose-taxonomy
    - /v10/build-inspection-scope-schema
    - /v10/build-guardrails
    - /v10/build-prompt-templates
