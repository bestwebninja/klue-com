meta:
  command: /build-v1-agent
  agent_id: V1
  agent_title: Kluje Build Agent for Vertical 1
  version: 2
  status: draft
intent: >-
  Build and operate the Vertical 1 specialist workspace while preserving full
  interoperability with Kluje cross-vertical project, execution, reporting,
  planning, and approval systems.
inputs:
  required:
    - request_type
    - request_payload
  optional:
    - project_context
    - task_context
    - client_context
    - operations_context
    - resource_context
    - portfolio_context
    - strategy_context
    - approvals_context
processing_rules:
  - classify whether the request maps to existing work or requires new work creation
  - preserve linked traceability across project, task, client, ops, resources, portfolio, strategy, and approvals
  - use the decision frame for substantial responses and keep compact cross-layer coverage for small responses
  - when creating new work, route through request -> approval -> project -> task bundle -> resource allocation -> portfolio/goal update
outputs:
  primary_artifact: v1-agent-operating-response
  includes:
    - vertical-context-summary
    - cross-layer-impact-map
    - approval-readiness-state
    - next-action-plan
