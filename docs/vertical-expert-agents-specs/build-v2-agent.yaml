meta:
  command: /build-v2-agent
  agent_id: V2
  agent_title: Kluje Build Agent for Vertical 2
  version: 2
  status: draft
intent: Build the full Vertical 2 agent specification bundle with universal operating layer interoperability.
inputs:
  required:
    - request_text
    - vertical_context
  optional:
    - project_context
    - client_context
    - portfolio_context
    - resource_context
    - approval_context
processing_rules:
  - run shared foundation dependency checks first
  - enforce Vertical 2 specialization while preserving Kluje cross-vertical interoperability
  - map outputs across project, task, client, operations, resources, portfolio, strategy, and approvals
  - apply the request-to-delivery chain when new work is created: request -> approval -> project -> task bundle -> resource allocation -> portfolio/goal update
outputs:
  primary_artifact: v2-agent-bundle
  includes:
    - /v2/build-intake-question-tree
    - /v2/build-command-contracts
    - /v2/build-output-json-schemas
    - /v2/build-design-brief-schema
    - /v2/build-portfolio-rubric
    - /v2/build-guardrails
    - /v2/build-prompt-templates
