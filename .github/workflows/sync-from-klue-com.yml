name: Sync from klue-com

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN is always available — no custom secret needed here
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror klue-com main → target main
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Use SOURCE_REPO_TOKEN for private source; falls back to public HTTPS
          if [ -n "$SOURCE_TOKEN" ]; then
            SOURCE_URL="https://x-access-token:${SOURCE_TOKEN}@github.com/bestwebninja/klue-com.git"
          else
            SOURCE_URL="https://github.com/bestwebninja/klue-com.git"
          fi

          git remote add source "$SOURCE_URL"
          git fetch source main --depth=1

          git checkout main
          git reset --hard source/main

          git push origin main --force
