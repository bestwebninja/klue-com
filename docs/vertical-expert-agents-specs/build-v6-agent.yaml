meta:
  command: /build-v6-agent
  agent_id: V6
  agent_title: Business Services Expert
  version: 1
  status: draft
intent: Build the full V6 agent specification bundle.
inputs:
  required:
    - business_objective
    - operating_context
  optional:
    - team_size
    - timeline
processing_rules:
  - run shared foundation dependency checks first
  - normalize deliverables and handoff terms
outputs:
  primary_artifact: v6-agent-bundle
  includes:
    - /v6/build-intake-question-tree
    - /v6/build-command-contracts
    - /v6/build-output-json-schemas
    - /v6/build-deliverables-taxonomy
    - /v6/build-handoff-framework
    - /v6/build-guardrails
    - /v6/build-prompt-templates
