shared_patterns:
  quote_evaluation_dimensions:
    - scope_completeness
    - exclusions
    - assumptions
    - timeline
    - access_requirements
    - materials_or_tools
    - compliance_or_liability
    - reporting_deliverables
    - pricing_structure
    - risk_flags
  standard_outputs:
    - intake_summary
    - structured_scope_document
    - provider_questions
    - quote_summary
    - gap_analysis
    - next_best_action

shared_codex_build:
  purpose: >
    Shared codex build instructions and normalization rules for all Vertical Expert Agents.
    This section ensures every agent follows the same contract shape, output conventions,
    guardrail model, and prompt-template structure while still allowing category-specific logic.
  command_schema:
    fields:
      - command
      - trigger
      - required_inputs
      - optional_inputs
      - processing_rules
      - outputs
      - output_schema
      - guardrails
    conventions:
      - use slash-prefixed command naming
      - keep required_inputs to minimum viable scoping set
      - distinguish advisory logic from workflow execution
      - define outputs in provider-ready and platform-readable form
      - guardrails must be explicit for regulated, hazardous, or privacy-sensitive contexts
  input_output_contract_rules:
    input_rules:
      - required_inputs must be sufficient to produce a minimum safe advisory response
      - optional_inputs should improve precision but not block output
      - unknown or missing inputs must be surfaced in missing_information_list when applicable
      - user-provided quote or proposal text should be preserved as source material for quote-check commands
    output_rules:
      - every intake command should produce intake_summary and next_best_action
      - every scope command should produce structured_scope_document or equivalent category-specific scope artifact
      - every quote-check command should produce quote_summary, gap_analysis, risk_flags, and vendor_questions
      - outputs must support both human-readable summaries and later JSON schema enforcement
  shared_standard_outputs:
    - intake_summary
    - missing_information_list
    - structured_scope_document
    - provider_questions
    - quote_summary
    - gap_analysis
    - risk_flags
    - comparison_scorecard
    - next_best_action
  shared_quote_evaluation_model:
    dimensions:
      - scope_completeness
      - exclusions
      - assumptions
      - timeline
      - commercial_clarity
      - provider_fit
      - compliance_or_liability
      - reporting_deliverables
      - operational_risk
      - support_model
    score_levels:
      - low
      - medium
      - high
  shared_rebundlable_module_schema:
    fields:
      - name
      - can_attach_to
      - commands
      - value
    conventions:
      - modules must be attachable across at least two agents to qualify as rebundlable
      - modules should enhance intake, scope quality, or quote comparability
      - modules should not override workflow ownership by core_agents

codex_build_commands:
  - command: /build-shared-foundation
    purpose: Build the shared schema, contract, output, scoring, and module conventions used by all Vertical Expert Agents.
    expands_to:
      - /build-shared-command-schema
      - /build-shared-input-output-contracts
      - /build-shared-standard-outputs
      - /build-shared-quote-evaluation-model
      - /build-shared-rebundlable-module-schema
  - command: /build-shared-command-schema
    purpose: Define the canonical command contract shape used across all agents.
  - command: /build-shared-input-output-contracts
    purpose: Define input rules, output rules, required field behavior, and missing-information handling across all agents.
  - command: /build-shared-standard-outputs
    purpose: Define universal output artifacts such as intake_summary, structured_scope_document, quote_summary, and next_best_action.
  - command: /build-shared-quote-evaluation-model
    purpose: Define the common score dimensions used when comparing provider quotes and proposals.
  - command: /build-shared-rebundlable-module-schema
    purpose: Define the schema and attachment rules for modules that can be reused across multiple agents.
  - command: /build-v1-agent
    purpose: Build the Home Trades Expert agent from intake through quote evaluation.
    expands_to:
      - /v1/build-intake-question-tree
      - /v1/build-command-contracts
