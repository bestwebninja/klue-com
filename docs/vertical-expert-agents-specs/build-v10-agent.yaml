meta:
  command: /build-v10-agent
  agent_id: V10
  agent_title: Kluje Build Agent for Vertical 10
  version: 2
  status: draft
intent: Build the full V10 operating-agent specification bundle for cross-layer execution inside Kluje.
inputs:
  required:
    - request_type
    - vertical_scope
  optional:
    - project_context
    - client_context
    - portfolio_context
processing_rules:
  - run shared foundation dependency checks first
  - preserve interoperability with cross-vertical dashboard, planning, and approvals
  - map substantial work across project, task, client, operations, resources, portfolio, strategy, and approvals
  - when creating net-new work, enforce chain: request -> approval -> project -> task bundle -> resource allocation -> portfolio/goal update
outputs:
  primary_artifact: v10-agent-bundle
  includes:
    - /v10/build-intake-question-tree
    - /v10/build-command-contracts
    - /v10/build-output-json-schemas
    - /v10/build-cross-layer-decision-frame
    - /v10/build-dashboard-view-contracts
    - /v10/build-prompt-templates
