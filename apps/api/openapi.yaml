openapi: 3.1.0
info:
  title: Kluje Enterprise API
  version: 0.1.0
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Liveness endpoint
      responses:
        '200':
          description: API healthy
  /auth/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '503':
          description: Disabled. Use Supabase auth flow instead
  /auth/login:
    post:
      summary: Authenticate a user and issue JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '503':
          description: Disabled. Use Supabase auth flow instead
  /auth/me:
    get:
      summary: Return the authenticated user from access JWT
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
        '401':
          description: Missing, invalid, or expired token
        '503':
          description: Auth validation backend unavailable
  /campaigns:
    get:
      summary: List campaigns
      responses:
        '200':
          description: Campaign list
    post:
      summary: Create campaign
      responses:
        '201':
          description: Campaign created
  /leads:
    post:
      summary: Ingest lead with marketplace scoping metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadIntakeRequest'
      responses:
        '201':
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadIntakeResponse'
        '400':
          description: Validation error
  /leads/{leadId}:
    get:
      summary: Fetch a lead by identifier
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lead record
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/LeadIntakeResponse'
        '404':
          description: Lead not found
  /marketplace-agents:
    get:
      summary: List marketplace agents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Marketplace agents
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MarketplaceAgent'
    post:
      summary: Create marketplace agent contract/workflow backbone
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketplaceAgentRequest'
      responses:
        '201':
          description: Marketplace agent created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MarketplaceAgent'
        '400':
          description: Validation error
  /marketplace-agents/{agentId}:
    get:
      summary: Fetch marketplace agent by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: agentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marketplace agent record
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MarketplaceAgent'
        '400':
          description: Invalid marketplace agent identifier
        '404':
          description: Marketplace agent not found
    patch:
      summary: Update marketplace agent contracts/workflows metadata
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: agentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMarketplaceAgentRequest'
      responses:
        '200':
          description: Marketplace agent updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/MarketplaceAgent'
        '400':
          description: Validation error
        '404':
          description: Marketplace agent not found
  /providers/search:
    get:
      summary: Search providers with hard constraints and rank scoring
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: serviceCategory
          required: true
          schema:
            type: string
        - in: query
          name: budget
          required: false
          schema:
            type: number
        - in: query
          name: zipCode
          required: false
          schema:
            type: string
        - in: query
          name: intent
          required: false
          schema:
            type: string
            enum: [urgent_service, planned_project, quote_only]
        - in: query
          name: topN
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Ranked provider candidates
  /routing/evaluate:
    post:
      summary: Evaluate marketplace routing decision (no dispatch)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, leadSummary, serviceCategory, requester]
              properties:
                tenantId: { type: string, format: uuid }
                leadId: { type: string, format: uuid }
                leadSummary: { type: string }
                serviceCategory: { type: string }
                requestedTimeline: { type: string }
                budget: { type: number }
                zipCode: { type: string }
                topN: { type: integer, minimum: 1, maximum: 20 }
                dryRun: { type: boolean, default: false }
                requester:
                  type: object
                  properties:
                    email: { type: string, format: email }
                    orgName: { type: string }
                    tags:
                      type: array
                      items: { type: string }
                attributes:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Routing evaluation result
        '400':
          description: Validation error
  /routing/dispatch:
    post:
      summary: Dispatch a previously evaluated routing run
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [runId]
              properties:
                runId: { type: string, format: uuid }
      responses:
        '200':
          description: Routing dispatch accepted
        '400':
          description: Validation error
        '404':
          description: Routing run not found
  /routing/runs/{runId}:
    get:
      summary: Fetch routing run with transparent decision and handoff details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Routing run details
        '400':
          description: Invalid run identifier
        '404':
          description: Routing run not found
  /messages/threads:
    post:
      summary: Create a messaging thread for marketplace coordination
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Thread created
        '400':
          description: Validation error
  /messages/threads/{threadId}:
    get:
      summary: Fetch an existing messaging thread
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thread found
        '400':
          description: Invalid thread identifier
        '404':
          description: Thread not found
  /messages/threads/{threadId}/messages:
    post:
      summary: Send a message in an existing thread
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadMessage'
        '400':
          description: Validation error
        '404':
          description: Thread not found
  /appointments:
    post:
      summary: Create an appointment for marketplace follow-up
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Appointment created
        '400':
          description: Validation error
  /appointments/{appointmentId}:
    get:
      summary: Fetch a marketplace appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Appointment found
        '400':
          description: Invalid appointment identifier
        '404':
          description: Appointment not found
    patch:
      summary: Update an appointment status or schedule
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchAppointmentRequest'
      responses:
        '200':
          description: Appointment updated
        '400':
          description: Validation error
        '404':
          description: Appointment not found
  /quote-requests/{id}:
    get:
      summary: Fetch quote request reasoning and dispatch outcomes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quote request found
        '404':
          description: Quote request not found
  /billing/checkout-session:
    post:
      summary: Create Stripe Checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, customerId, planTier]
              properties:
                tenantId: { type: string }
                customerId: { type: string }
                planTier:
                  type: string
                  enum: [starter, growth, enterprise]
                advertiserId: { type: string }
                successUrl: { type: string, format: uri }
                cancelUrl: { type: string, format: uri }
      responses:
        '201':
          description: Checkout session created
  /billing/subscriptions/{tenantId}:
    get:
      summary: Fetch current subscription and billing status for a tenant
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription found
        '404':
          description: Tenant has no active Stripe subscription
  /billing/webhooks/stripe:
    post:
      summary: Stripe webhook endpoint
      description: |
        Validates Stripe signature and updates internal subscription status tracker.
        Uses event-id idempotency to skip duplicate deliveries.
      responses:
        '200':
          description: Event processed
        '400':
          description: Signature verification failed
  /area-risk/score:
    post:
      summary: Score regional operational area risk at a safe geography level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input, areaProfiles]
              properties:
                input:
                  type: object
                  properties:
                    address: { type: string }
                    lat: { type: number }
                    lng: { type: number }
                    tract: { type: string }
                    zip: { type: string }
                    county: { type: string }
                    cityCluster: { type: string }
                context:
                  type: object
                  properties:
                    clientKey: { type: string }
                areaProfiles:
                  type: object
                  description: Candidate geographic profiles used for safe geography escalation
      responses:
        '200':
          description: Area risk score or safe suppression
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaRiskScoreResponse'
  /verification/start:
    post:
      summary: Start provider verification workflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartVerificationRequest'
      responses:
        '201':
          description: Verification request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartVerificationResponse'
  /verification/documents:
    post:
      summary: Store provider verification document metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationDocumentUploadRequest'
      responses:
        '201':
          description: Document metadata saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationDocumentUploadResponse'
        '404':
          description: Verification request not found
  /verification/{providerId}/status:
    get:
      summary: Get latest verification and compliance status for provider
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: providerId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Verification status details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatusResponse'
        '404':
          description: Verification request not found for provider
  /admin/verification/{requestId}/decision:
    post:
      summary: Admin decision on provider verification request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminVerificationDecisionRequest'
      responses:
        '200':
          description: Decision captured and audited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVerificationDecisionResponse'
        '403':
          description: Admin role required
        '404':
          description: Verification request not found
  /ads/placements/recommendations:
    post:
      summary: Generate AI placement recommendations for a campaign brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vertical, dailyBudget, targetGeos]
              properties:
                vertical: { type: string }
                dailyBudget: { type: number }
                targetGeos:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Ranked placements returned
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateThreadRequest:
      type: object
      required: [subject, participantIds]
      properties:
        subject: { type: string }
        participantIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        context:
          type: object
          additionalProperties: true
    SendMessageRequest:
      type: object
      required: [senderId, body]
      properties:
        senderId: { type: string, format: uuid }
        body: { type: string }
        metadata:
          type: object
          additionalProperties: true
    ThreadMessage:
      allOf:
        - $ref: '#/components/schemas/SendMessageRequest'
        - type: object
          required: [id, threadId, createdAt]
          properties:
            id: { type: string, format: uuid }
            threadId: { type: string, format: uuid }
            createdAt: { type: string, format: date-time }
    CreateAppointmentRequest:
      type: object
      required: [providerId, scheduledFor, timezone]
      properties:
        threadId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        leadId: { type: string, format: uuid }
        scheduledFor: { type: string, format: date-time }
        timezone: { type: string }
        notes: { type: string }
    PatchAppointmentRequest:
      type: object
      properties:
        status:
          type: string
          enum: [scheduled, confirmed, completed, cancelled]
        scheduledFor: { type: string, format: date-time }
        timezone: { type: string }
        notes: { type: string }
    LeadAttachment:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 0 }
    LeadScope:
      type: object
      required: [summary]
      properties:
        summary: { type: string }
        urgency:
          type: string
          enum: [asap, planned, researching]
        deliverables:
          type: array
          items: { type: string }
        preferredStartDate: { type: string }
        accessibilityNeeds:
          type: array
          items: { type: string }
    LeadIntakeRequest:
      type: object
      required: [source, contactName, contactEmail, location, serviceCategory, intentScore]
      properties:
        source: { type: string }
        contactName: { type: string }
        contactEmail: { type: string, format: email }
        contactPhone: { type: string }
        location: { type: string }
        serviceCategory: { type: string }
        intentScore: { type: number, minimum: 0, maximum: 100 }
        budgetMin: { type: number, minimum: 0 }
        budgetMax: { type: number, minimum: 0 }
        timeline:
          type: string
          enum: [urgent, this_week, this_month, flexible]
        requirements:
          type: array
          items: { type: string }
        scope:
          $ref: '#/components/schemas/LeadScope'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/LeadAttachment'
        priorityTier:
          type: string
          enum: [high, medium, low]
    LeadIntakeResponse:
      allOf:
        - $ref: '#/components/schemas/LeadIntakeRequest'
        - type: object
          required:
            - id
            - status
            - intakeStatus
            - normalizedCategory
            - normalizedLocation
            - intakeScore
            - missingInformation
            - enrichmentNotes
            - requirements
            - attachments
            - assignmentQueue
            - createdAt
            - updatedAt
          properties:
            id: { type: string, format: uuid }
            status:
              type: string
              enum: [new, routed, accepted, rejected]
            intakeStatus:
              type: string
              enum: [pending, in_review, needs_info, ready_for_routing]
            normalizedCategory: { type: string }
            normalizedLocation: { type: string }
            intakeScore: { type: number }
            missingInformation:
              type: array
              items:
                type: object
                required: [code, message, severity]
                properties:
                  code: { type: string }
                  message: { type: string }
                  severity:
                    type: string
                    enum: [low, medium, high]
            enrichmentNotes:
              type: array
              items: { type: string }
            assignmentQueue:
              type: array
              items: { type: string }
            assignedAgentId: { type: string }
            routedAt: { type: string, format: date-time }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    ComplianceFlag:
      type: object
      required: [id, providerId, source, code, severity, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        requestId: { type: string, format: uuid, nullable: true }
        providerId: { type: string, format: uuid }
        source: { type: string }
        code: { type: string }
        severity:
          type: string
          enum: [info, warning, critical]
        status:
          type: string
          enum: [open, resolved]
        details:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
    VerificationEvent:
      type: object
      required: [id, eventType, actorId, createdAt, payload]
      properties:
        id: { type: string, format: uuid }
        eventType:
          type: string
          enum: [verification_started, document_uploaded, decision_recorded, compliance_flag_created]
        actorId: { type: string }
        payload:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
    VerificationDocument:
      type: object
      required: [id, requestId, providerId, documentType, storageUrl, status, uploadedBy, uploadedAt]
      properties:
        id: { type: string, format: uuid }
        requestId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        documentType:
          type: string
          enum: [business_license, insurance_certificate, identity_document, tax_document, other]
        storageUrl: { type: string, format: uri }
        checksum: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [submitted, accepted, rejected]
        uploadedBy: { type: string }
        uploadedAt: { type: string, format: date-time }
    StartVerificationRequest:
      type: object
      required: [providerId]
      properties:
        providerId: { type: string, format: uuid }
        notes: { type: string, maxLength: 2000 }
    StartVerificationResponse:
      type: object
      required: [requestId, providerId, status, createdAt]
      properties:
        requestId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, approved, rejected, needs_more_info]
        createdAt: { type: string, format: date-time }
    VerificationDocumentUploadRequest:
      type: object
      required: [requestId, providerId, documentType, storageUrl]
      properties:
        requestId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        documentType:
          type: string
          enum: [business_license, insurance_certificate, identity_document, tax_document, other]
        storageUrl: { type: string, format: uri }
        checksum: { type: string }
        metadata:
          type: object
          additionalProperties: true
    VerificationDocumentUploadResponse:
      type: object
      required: [documentId, requestId, providerId, status, uploadedAt]
      properties:
        documentId: { type: string, format: uuid }
        requestId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        status:
          type: string
          enum: [submitted]
        uploadedAt: { type: string, format: date-time }
    VerificationStatusResponse:
      type: object
      required: [requestId, providerId, status, documents, complianceFlags, events, createdAt, updatedAt]
      properties:
        requestId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, approved, rejected, needs_more_info]
        notes: { type: string, nullable: true }
        decidedAt: { type: string, format: date-time, nullable: true }
        documents:
          type: array
          items:
            $ref: '#/components/schemas/VerificationDocument'
        complianceFlags:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceFlag'
        events:
          type: array
          items:
            $ref: '#/components/schemas/VerificationEvent'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AdminVerificationDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected, needs_more_info]
        notes: { type: string, maxLength: 2000 }
        reasonCode: { type: string }
    AdminVerificationDecisionResponse:
      type: object
      required: [requestId, providerId, status, decidedAt]
      properties:
        requestId: { type: string, format: uuid }
        providerId: { type: string, format: uuid }
        status:
          type: string
          enum: [approved, rejected, needs_more_info]
        decidedAt: { type: string, format: date-time }
    AgentContract:
      type: object
      required: [id, version, inputSchema, outputSchema]
      properties:
        id: { type: string }
        version: { type: string }
        inputSchema:
          type: object
          additionalProperties: true
        outputSchema:
          type: object
          additionalProperties: true
    AgentWorkflowStep:
      type: object
      required: [id, type, config]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [trigger, action, approval, handoff]
        config:
          type: object
          additionalProperties: true
    CreateMarketplaceAgentRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [draft, active, paused, archived]
          default: draft
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/AgentContract'
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/AgentWorkflowStep'
        metadata:
          type: object
          additionalProperties: true
    UpdateMarketplaceAgentRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [draft, active, paused, archived]
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/AgentContract'
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/AgentWorkflowStep'
        metadata:
          type: object
          additionalProperties: true
    MarketplaceAgent:
      allOf:
        - $ref: '#/components/schemas/CreateMarketplaceAgentRequest'
        - type: object
          required: [id, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    AreaRiskScoreResponse:
      type: object
      required: [status, compliance, compliance_flags]
      properties:
        status:
          type: string
          enum: [ok, suppressed, blocked]
        geography:
          type: object
          nullable: true
          properties:
            output_level: { type: string, enum: [tract, zip, county, city_cluster] }
            geography_id: { type: string }
            geography_name: { type: string }
        area_risk:
          type: object
          nullable: true
          properties:
            score: { type: number }
            band: { type: string, enum: [low, moderate, elevated, high] }
        compliance:
          type: object
          required: [output_level, property_specific_inference, household_specific_inference]
          properties:
            output_level: { type: string, enum: [tract, zip, county, city_cluster, suppressed] }
            property_specific_inference: { type: boolean }
            household_specific_inference: { type: boolean }
        suppression_reason: { type: string }
        block_reason: { type: string }
        compliance_flags:
          type: array
          items:
            type: object
            required: [code, severity]
            properties:
              code: { type: string }
              severity: { type: string, enum: [info, warning, critical] }
