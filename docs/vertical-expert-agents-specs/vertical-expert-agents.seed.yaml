agent_registry:
  suite: vertical_expert_agents
  version: 0.1
  default_operating_model:
    mode: advisory
    workflow_owner: core_agents
    output_style: structured
  agents:
    - id: V1
      title: Home Trades Expert
      vertical: Electricians, plumbers, carpenters, builders, home repairs and renovations
      build_command: /build-v1-agent
      primary_commands:
        - /v1/intake
        - /v1/scope
        - /v1/quote-check
        - /v1/site-checklist
      specialist_capabilities:
        - issue triage
        - home repair scoping
        - provider-type matching
        - site-readiness preparation
      rebundlable_modules:
        - Home Site Readiness Module
    - id: V2
      title: Design & Build Expert
      vertical: Architects, interior design, design-build, renovation planning
      build_command: /build-v2-agent
      primary_commands:
        - /v2/vision-intake
        - /v2/project-brief
        - /v2/portfolio-check
        - /v2/quote-check
      specialist_capabilities:
        - design brief creation
        - style and constraint translation
        - portfolio-fit evaluation
        - proposal comparison
      rebundlable_modules:
        - Project Briefing Module
    - id: V3
      title: Living Solutions Expert
      vertical: Home services, maintenance, recurring household and property support
      build_command: /build-v3-agent
      primary_commands:
        - /v3/maintenance-intake
        - /v3/recurring-plan
        - /v3/service-bundle
        - /v3/quote-check
      specialist_capabilities:
        - recurring-service planning
        - cadence design
        - service bundling
        - recurring quote comparison
      rebundlable_modules:
        - Recurring Service Bundle Module
    - id: V4
      title: Commercial & Facilities Expert
      vertical: Businesses, landlords, commercial properties, facilities, multi-site operations
      build_command: /build-v4-agent
      primary_commands:
        - /v4/facility-intake
        - /v4/sow
        - /v4/sla-check
        - /v4/vendor-compare
      specialist_capabilities:
        - facilities scoping
        - statement of work design
        - SLA evaluation
        - vendor comparison
      rebundlable_modules:
        - Managed Service Comparison Module
    - id: V5
      title: Vertical 5 Command Center Operations Expert
      vertical: project operations, approvals, business operations, resource planning, portfolio and strategy execution
      build_command: /build-v5-agent
      primary_commands:
        - /v5/project-request
        - /v5/task-request
        - /v5/approval-routing
        - /v5/resource-allocation
        - /v5/portfolio-rollup
        - /v5/dashboard-summary
      specialist_capabilities:
        - cross-domain request routing
        - universal operating layer normalization
        - approval and policy enforcement
        - dashboard synthesis with risk and goal alignment
        - cross-vertical rollup compatibility
      rebundlable_modules:
        - Remote Monitoring & Incident Response Module
    - id: V6
      title: Business Services Expert
      vertical: Accounting, consulting, admin support, outsourced business operations
      build_command: /build-v6-agent
      primary_commands:
        - /v6/requirements-intake
        - /v6/scope
        - /v6/quote-check
        - /v6/handoff-plan
      specialist_capabilities:
        - deliverable definition
        - scope-of-work creation
        - pricing-model evaluation
        - handoff planning
      rebundlable_modules:
        - Deliverables & Handoff Module
    - id: V7
      title: Legal Services Expert
      vertical: Legal services, lawyer matching, factual matter intake
      build_command: /build-v7-agent
      primary_commands:
        - /v7/matter-intake
        - /v7/lawyer-match
        - /v7/brief-builder
        - /v7/quote-check
      specialist_capabilities:
        - matter classification
        - lawyer-type matching
        - factual consultation briefs
        - legal fee-structure comparison
      rebundlable_modules:
        - Regulated Intake Guardrails Module
    - id: V8
      title: Property Management Expert
      vertical: Residential rentals, strata, landlords, asset operations, turnover management
      build_command: /build-v8-agent
      primary_commands:
        - /v8/property-intake
        - /v8/turnover-scope
        - /v8/management-plan
        - /v8/vendor-check
      specialist_capabilities:
        - tenancy-context scoping
        - turnover planning
        - management-support design
        - property operations quote evaluation
      rebundlable_modules:
        - Turnover & Readiness Module
    - id: V9
      title: Real Estate Transactions Expert
      vertical: Buying, selling, leasing, conveyancing support, transaction coordination
      build_command: /build-v9-agent
      primary_commands:
        - /v9/transaction-intake
        - /v9/service-map
        - /v9/deal-readiness
        - /v9/quote-check
      specialist_capabilities:
