version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kluje
      POSTGRES_PASSWORD: kluje
      POSTGRES_DB: kluje
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  web:
    build:
      context: ../apps/web
    ports:
      - "5175:5175"
    depends_on:
      - api

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.86.1
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - ../n8n/workflows:/data/workflows

volumes:
  pg_data:
