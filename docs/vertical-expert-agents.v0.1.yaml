cross_agent_dependency_map:
  shared_modules:
    - module: command_schema
      source_command: /build-shared-command-schema
      consumed_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]
    - module: input_output_contracts
      source_command: /build-shared-input-output-contracts
      consumed_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]
    - module: standard_outputs
      source_command: /build-shared-standard-outputs
      consumed_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]
    - module: quote_evaluation_model
      source_command: /build-shared-quote-evaluation-model
      consumed_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]
    - module: rebundlable_module_schema
      source_command: /build-shared-rebundlable-module-schema
      consumed_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]

  reusable_schemas:
    command_contract_schema:
      fields: [summary, assumptions, missing_information_list, recommendations]
      used_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]
    standard_output_schema:
      fields: [id, version, summary, sections]
      source: /build-shared-standard-outputs
      used_by: [V1, V2, V3, V4, V5, V6, V7, V8, V9, V10]

  specialist_capability_dependencies:
    risk_and_compliance_cluster:
      agents: [V1, V5, V7, V10]
      artifacts:
        - /v1/build-risk-taxonomy
        - /v5/build-risk-taxonomy
        - /v5/build-compliance-warning-library
        - /v7/build-legal-guardrail-library
        - /v10/build-property-risk-taxonomy
    operations_cluster:
      agents: [V3, V4, V6, V8, V9]
      artifacts:
        - /v3/build-bundle-logic
        - /v4/build-sla-taxonomy
        - /v6/build-handoff-framework
        - /v8/build-turnover-workflow-taxonomy
        - /v9/build-service-dependency-map

release_notes:
  normalization_decisions:
    - kept slash-command names as canonical identifiers.
    - normalized operating_model fields across all agents.
    - represented shared quote-check as a shared dependency rather than duplicate per-agent command.
  open_items:
    - none
